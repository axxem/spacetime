services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-info@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${DATA:-.}/letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
  mongo:
    image: mongo:4.4
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: idata
    volumes:
      - ${DATA:-.}/mongo:/data/db
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - ${DATA:-.}/qdrant:/qdrant/storage
  server:
    image: ${REPOSITORY:-spacetimehub}/server:${IMAGE_TAG:-latest}
    container_name: server
    restart: unless-stopped
    ports:
      - "8010:80"
    environment:
      MONGODB_URI: mongodb://mongo/idata
      AGENT_URL: http://agent
      MODE: production
      JWT: "false"
      LOGLEVEL: info
      TZ: Europe/Amsterdam
      LATITUDE: 51.41191 
      LONGITUDE: 5.44969 
    volumes:
      -  ${DATA:-.}/server:/usr/src/app/data
    depends_on:
      - mongo
    labels:
        - "traefik.enable=true"                                                                                                      
        - "traefik.http.routers.server.rule=Host(`server.${DOMAIN:-localhost}`)"
        - "traefik.http.routers.server.entrypoints=websecure"                                                                        
        - "traefik.http.routers.server.tls.certresolver=letsencrypt"
        - "traefik.http.services.server.loadbalancer.server.port=80"   
  portal:
    image: ${REPOSITORY:-spacetimehub}/portal:${IMAGE_TAG:-latest}
    container_name: portal
    restart: unless-stopped
    ports:
      - "3000:80"
    labels:
        - "traefik.enable=true"                                                                                                      
        - "traefik.http.routers.portal.rule=Host(`portal.${DOMAIN:-localhost}`)"
        - "traefik.http.routers.portal.entrypoints=websecure"                                                                        
        - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
        - "traefik.http.services.portal.loadbalancer.server.port=80"   
  forms:
    image: ${REPOSITORY:-spacetimehub}/forms:${IMAGE_TAG:-latest}
    container_name: forms 
    restart: unless-stopped
    ports:
      - "3002:80"
    labels:
        - "traefik.enable=true"                                                                                                      
        - "traefik.http.routers.forms.rule=Host(`forms.${DOMAIN:-localhost}`)"
        - "traefik.http.routers.forms.entrypoints=websecure"                                                                        
        - "traefik.http.routers.forms.tls.certresolver=letsencrypt"
        - "traefik.http.services.forms.loadbalancer.server.port=80"   
  modeler:
    image: ${REPOSITORY:-spacetimehub}/modeler:${IMAGE_TAG:-latest}
    container_name: modeler 
