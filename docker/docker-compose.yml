  agent:
    image: ${REPOSITORY:-spacetimehub}/agent:${IMAGE_TAG:-latest}
    container_name: agent
    restart: unless-stopped
    ports:
      - "8030:8030"
    environment:
      QDRANT_URL: http://qdrant:6333
      SERVER_URL: http://server
      COHERE_API_KEY: ${COHERE_API_KEY} 
      LLM: cohere
    labels:
